# Block Mirai botnet and common exploit scanner paths
location ~* ^/(device\.rsp|shell|cgi-bin|phpinfo|php\.php|test\.php|info\.php|i\.php|php-info\.php|php_info\.php) {
    return 444;
}

# Block credential/config file probing
location ~* \.(env|aws|git|docker|kube|npmrc|netrc|htpasswd)$ {
    return 444;
}

location ~* ^/\.(env|aws|git|docker|kube) {
    return 444;
}

# Block encoded path traversal attempts
location ~* %2e%2e|%252e|%00 {
    return 444;
}
